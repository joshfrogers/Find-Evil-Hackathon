<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1240" viewBox="0 0 980 1240" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <style>
      .title  { font-size: 26px; font-weight: 700; fill: #202124; }
      .sub    { font-size: 14px; fill: #5f6368; }
      .boxh   { font-size: 16px; font-weight: 700; fill: #202124; }
      .boxt   { font-size: 12.5px; fill: #3c4043; }
      .arch   { font-size: 11px; font-weight: 700; fill: #c5221f; }
      .side   { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
      .tb     { font-size: 15px; font-weight: 700; fill: #c5221f; }
      .lgd    { font-size: 12.5px; fill: #3c4043; }
      .edge   { stroke: #5f6368; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="980" height="1240" fill="#ffffff"/>
  <text x="40" y="48" class="title">Agentic SIFT — Architecture</text>
  <text x="40" y="72" class="sub">Autonomous forensic analysis · Python orchestrator + Claude (Anthropic API) + SANS SIFT tools · local-first, single workstation</text>

  <!-- REASONING SIDE band label -->
  <text x="40" y="112" class="side" fill="#1a73e8">REASONING SIDE — the LLM decides WHAT to investigate and HOW to interpret results</text>

  <!-- User -> CLI -->
  <rect x="40" y="124" width="240" height="48" rx="8" fill="#f1f3f4" stroke="#9aa0a6"/>
  <text x="60" y="146" class="boxh">User → CLI</text>
  <text x="60" y="164" class="boxt">cli/main.py · investigate / refresh / score</text>

  <!-- Orchestrator -->
  <rect x="40" y="196" width="900" height="74" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.8"/>
  <text x="60" y="222" class="boxh">Orchestrator — hypothesis-driven loop</text>
  <text x="700" y="222" class="arch">[ARCHITECTURAL] max 5 rounds</text>
  <text x="60" y="244" class="boxt">orchestrator/investigator.py · triage → form hypotheses → dispatch → verify → deepen / pivot → correlate → report</text>
  <text x="60" y="262" class="boxt">reads / writes the Progress Tracker (progress.json) as cross-round memory</text>

  <!-- Sub-agents + verifier -->
  <rect x="40" y="294" width="430" height="92" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.8"/>
  <text x="60" y="320" class="boxh">Domain Sub-Agents (6)</text>
  <text x="60" y="340" class="boxt">agents/ · Disk · Memory · Timeline ·</text>
  <text x="60" y="358" class="boxt">Windows Artifacts · Network · Malware</text>
  <text x="60" y="378" class="boxt">each plans tools, interprets output → Findings</text>

  <rect x="510" y="294" width="430" height="92" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.8"/>
  <text x="530" y="320" class="boxh">Verifier Agents</text>
  <text x="530" y="340" class="boxt">verification/ · challenge / refute findings</text>
  <text x="530" y="358" class="boxt">evidence check · counter-evidence · corroborate</text>
  <text x="530" y="378" class="arch">[ARCHITECTURAL] max 3 challenge rounds</text>

  <!-- Tool catalog -->
  <rect x="40" y="410" width="900" height="74" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.8"/>
  <text x="60" y="436" class="boxh">Tool Catalog — scanned per machine, gated per domain</text>
  <text x="700" y="436" class="arch">[ARCHITECTURAL] gating</text>
  <text x="60" y="458" class="boxt">tool_registry/ scanner + enrich · catalog/gates.py — each sub-agent sees ONLY its domain's installed tools.</text>
  <text x="60" y="476" class="boxt">No tool list is ever hardcoded into a prompt. The executor validates against this same catalog.</text>

  <!-- proposed command label -->
  <text x="490" y="506" class="sub" text-anchor="middle">proposed command — plain text only, no execution capability</text>

  <!-- TRUST BOUNDARY -->
  <line x1="40" y1="520" x2="940" y2="520" stroke="#ea4335" stroke-width="2.4" stroke-dasharray="10 6"/>
  <rect x="330" y="508" width="320" height="24" rx="12" fill="#fce8e6" stroke="#ea4335"/>
  <text x="490" y="525" class="tb" text-anchor="middle">TRUST BOUNDARY</text>

  <!-- EXECUTION SIDE band label -->
  <text x="40" y="556" class="side" fill="#137333">EXECUTION SIDE — the Python code decides WHAT CAN run. The LLM never touches subprocess / SSH / the filesystem.</text>

  <!-- Executor -->
  <rect x="40" y="570" width="900" height="118" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.8"/>
  <text x="60" y="596" class="boxh">Executor — validation pipeline (code, not prompt)</text>
  <text x="700" y="596" class="arch">[ARCHITECTURAL]</text>
  <text x="60" y="620" class="boxt">1. Allowlist check (tool in catalog?)    2. Argument validation (known flags?)    3. Path validation (under evidence root? symlink-escape)</text>
  <text x="60" y="640" class="boxt">4. Build argv array — never shell=True    5. Execute with limits (timeout, output cap)    6. Capture + log → ExecutionResult (exec_id)</text>
  <text x="60" y="668" class="boxt">executor/runner.py · LocalExecutor (shipped, single machine) | SSHExecutor (dev-only, no baked-in defaults)</text>

  <!-- SIFT tools + Evidence -->
  <rect x="40" y="712" width="430" height="92" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="1.8"/>
  <text x="60" y="738" class="boxh">SIFT Forensic Tools</text>
  <text x="60" y="758" class="boxt">read-only set · fls, mmls, fsstat, volatility3,</text>
  <text x="60" y="776" class="boxt">log2timeline, RegRipper, tshark, yara, …</text>
  <text x="60" y="796" class="boxt">run by the executor; results returned to agents</text>

  <rect x="510" y="712" width="430" height="92" rx="10" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.8"/>
  <text x="530" y="738" class="boxh">Evidence Sources</text>
  <text x="530" y="758" class="boxt">evidence/ · disk images (.E01/.raw), memory, pcap</text>
  <text x="530" y="776" class="boxt">read-only mount (losetup -r + mount)</text>
  <text x="530" y="796" class="arch">[ARCHITECTURAL] SHA-256 integrity bracket (before/after)</text>

  <!-- Output pipeline -->
  <rect x="40" y="830" width="900" height="118" rx="10" fill="#f3e8fd" stroke="#a142f4" stroke-width="1.8"/>
  <text x="60" y="856" class="boxh">Output Pipeline — full traceability</text>
  <text x="60" y="880" class="boxt">Audit Logger (audit/logger.py) → audit.jsonl — every execution, agent message, decision, finding, verification</text>
  <text x="60" y="900" class="boxt">Correlation (temporal + semantic) · Accuracy scoring (precision / recall / F1 + hallucination detection)</text>
  <text x="60" y="920" class="boxt">Report Generator (report/generator.py) → report.json + report.md     ·     Progress Tracker → progress.json</text>
  <text x="60" y="940" class="arch">finding → tool_execution id → exact command + output → evidence file</text>

  <!-- edges -->
  <path class="edge" d="M160,172 L160,196" marker-end="url(#arrow)"/>
  <path class="edge" d="M250,270 L250,294" marker-end="url(#arrow)"/>
  <path class="edge" d="M255,386 L255,410" marker-end="url(#arrow)"/>
  <path class="edge" d="M725,386 L725,410" marker-end="url(#arrow)"/>
  <path class="edge" d="M490,484 L490,508" marker-end="url(#arrow)"/>
  <path class="edge" d="M490,532 L490,570" marker-end="url(#arrow)"/>
  <path class="edge" d="M255,688 L255,712" marker-end="url(#arrow)"/>
  <path class="edge" d="M725,688 L725,712" marker-end="url(#arrow)"/>
  <path class="edge" d="M490,804 L490,830" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="980" width="900" height="210" rx="10" fill="#fafafa" stroke="#dadce0"/>
  <text x="60" y="1008" class="boxh">Legend — guardrails: architectural vs prompt-based</text>

  <rect x="60" y="1024" width="34" height="20" rx="5" fill="#ffffff" stroke="#202124" stroke-width="1.8"/>
  <text x="106" y="1039" class="lgd"><tspan font-weight="700">[ARCHITECTURAL]</tspan> — enforced in code; cannot be bypassed regardless of the prompt</text>
  <text x="126" y="1058" class="lgd">allowlist · per-domain gating · path sandbox · argv arrays (no shell) · timeouts · read-only mount · SHA-256 bracket · iteration caps · audit</text>

  <rect x="60" y="1074" width="34" height="20" rx="5" fill="#ffffff" stroke="#9aa0a6" stroke-width="1.8" stroke-dasharray="4 3"/>
  <text x="106" y="1089" class="lgd"><tspan font-weight="700">PROMPT-BASED</tspan> — instructed via the system prompt; shapes behaviour but is not enforced</text>
  <text x="126" y="1108" class="lgd">investigation methodology · hypothesis formation / pivots · confidence tiers (Confirmed / Inferred / Possible) · report narrative</text>

  <rect x="60" y="1126" width="20" height="20" rx="4" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="90" y="1141" class="lgd">Reasoning side (LLM)</text>
  <rect x="290" y="1126" width="20" height="20" rx="4" fill="#e6f4ea" stroke="#34a853"/>
  <text x="320" y="1141" class="lgd">Execution side (code)</text>
  <rect x="520" y="1126" width="20" height="20" rx="4" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="550" y="1141" class="lgd">Evidence (read-only)</text>
  <rect x="730" y="1126" width="20" height="20" rx="4" fill="#f3e8fd" stroke="#a142f4"/>
  <text x="760" y="1141" class="lgd">Output / audit</text>

  <text x="60" y="1174" class="sub">MCP is N/A: the in-process executor + trust boundary fill MCP's role (governing what the model can run) more strictly.</text>
</svg>
